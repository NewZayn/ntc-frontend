<header class="sticky top-0 z-50 border-b border-gray-800 bg-gray-950/80 backdrop-blur-md">
  <nav class="mx-auto flex h-16 max-w-6xl items-center justify-between px-4">
    <a routerLink="/" class="text-xl font-bold tracking-wide text-cyan-400 no-underline"
      >Network of Tomorrow</a
    >
    <ul class="m-0 flex list-none items-center gap-6 p-0">
      @for (item of navItems; track item.path) {
      <li>
        <a
          [routerLink]="item.path"
          class="text-sm text-gray-400 transition-colors duration-200 no-underline hover:text-white"
          >{{ item.label }}</a
        >
      </li>
      }
    </ul>
  </nav>
</header>
