<div class="mx-auto max-w-6xl px-4 py-16">
  <section class="mb-20 text-center">
    <h1
      class="mb-6 bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-5xl font-bold text-transparent md:text-7xl"
    >
      NTC
    </h1>
    <p class="mx-auto max-w-2xl text-lg text-gray-400 md:text-2xl">
      Notices Tech &amp; Connectivity &mdash; Dispatches from the frontier of the internet.
    </p>
  </section>

  <section>
    <div class="mb-8 flex items-center justify-between">
      <h2 class="text-2xl font-bold text-white">Latest Notices</h2>
      <a
        routerLink="/notices"
        class="text-cyan-400 no-underline transition-colors duration-200 hover:text-cyan-300"
        >View all &rarr;</a
      >
    </div>

    @if (notices().length > 0) {
    <div class="grid grid-cols-1 gap-8 md:grid-cols-2 lg:grid-cols-3">
      @for (notice of notices(); track notice.documentId) {
      <app-notice-card [notice]="notice" />
      }
    </div>
    } @else {
    <div class="py-16 text-center text-gray-500">
      <p class="text-lg">No notices yet.</p>
      <p class="mt-2 text-sm">Content will appear here once published via Strapi.</p>
    </div>
    }
  </section>
</div>
